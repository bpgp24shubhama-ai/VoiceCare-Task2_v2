# ============================================================
# VoiceCare.ai - AI Growth Engine Agent Configuration
# ============================================================

company:
  name: "VoiceCare.ai"
  website: "https://voicecare.ai"
  description: "AI-powered voice analytics and customer care platform"
  linkedin_url: "https://www.linkedin.com/company/voicecare-ai"
  current_followers: 2900
  target_followers: 10000
  target_months: 3

# SEMrush Configuration
semrush:
  database: "us"          # SEMrush regional database: us, uk, ca, au, de, fr, es, ...
  keyword_limit: 20       # Max keyword suggestions fetched per query
  competitor_limit: 5     # Max SERP competitors returned per keyword
  # API key is read from SEMRUSH_API_KEY env var

# OpenAI GPT-5 Configuration
ai:
  model: "gpt-5"  # GPT-5 with reasoning
  reasoning_effort: "high"
  temperature: 0.7
  max_tokens: 16000
  web_search:
    enabled: true
    context_size: "medium"  # low, medium, high
    search_recency: "month"  # day, week, month

# Competitor Analysis
competitors:
  - name: "Infinitus"
    website: "https://www.infinitus.ai"
    linkedin: "https://www.linkedin.com/company/infinitus-systems-inc"
  - name: "Notable"
    website: "https://www.notablehealth.com"
    linkedin: "https://www.linkedin.com/company/notablehealth"
  - name: "Hippocratic AI"
    website: "https://www.hippocraticai.com"
    linkedin: "https://www.linkedin.com/company/hippocratic-ai"
  - name: "Synthpop"
    website: "https://www.synthpop.ai"
    linkedin: "https://www.linkedin.com/company/synthpop"
  - name: "Heidi Health"
    website: "https://www.heidihealth.com"
    linkedin: "https://www.linkedin.com/company/heidihealth"
  - name: "Confido Health"
    website: "https://www.confidohealth.com"
    linkedin: "https://www.linkedin.com/company/confido-health"

# LinkedIn Growth Strategy
linkedin:
  posting_frequency: "daily"  # daily, 2x_daily, 3x_weekly
  optimal_post_times:
    - "08:00"
    - "12:00"
    - "17:30"
  content_mix:
    thought_leadership: 0.30
    product_insights: 0.15
    industry_trends: 0.20
    customer_stories: 0.10
    engagement_hooks: 0.15
    data_driven_posts: 0.10
  hashtag_strategy:
    primary:
      - "#VoiceAI"
      - "#ContactCenter"
      - "#CustomerExperience"
      - "#ConversationalAI"
      - "#CX"
    secondary:
      - "#AI"
      - "#ArtificialIntelligence"
      - "#SpeechAnalytics"
      - "#CallCenter"
      - "#VoiceAnalytics"
      - "#CustomerService"
      - "#AgentAssist"

# AI Engine Visibility (GEO - Generative Engine Optimization)
ai_visibility:
  target_engines:
    - "ChatGPT"
    - "Perplexity"
    - "Google Gemini"
    - "Claude"
    - "Copilot"
target_queries:
  - "best AI medical scribes"
  - "ambient clinical voice solutions"
  - "healthcare AI voice agents"
  - "AI clinical documentation software"
  - "healthcare revenue cycle AI automation"
  - "conversational AI for patient engagement"
  - "AI patient scheduling and intake"
  - "AI medical receptionist software"
  - "voice AI for patient outreach"
  - "generative AI for medical practices"

# Growth Hack Frameworks
growth_hacks:
  enabled:
    - "viral_content_loops"
    - "engagement_pods_organic"
    - "influencer_micro_collabs"
    - "comment_strategy"
    - "employee_advocacy"
    - "content_repurposing"
    - "linkedin_newsletter"
    - "linkedin_events"
    - "poll_engagement"
    - "carousel_strategy"
    - "geo_optimization"

# Schedule
schedule:
  competitor_analysis: "weekly"
  content_generation: "daily"
  ai_visibility_audit: "weekly"
  growth_report: "weekly"
  strategy_refresh: "biweekly"
